body:
  text: 究竟無我分第十七究竟真性諸法無我是故謂究竟無我分爾時須菩提爾時須菩提聞佛所説經義不可思議恐有不可言傳之心法白佛言遂啓白佛言世尊世尊曰善男子我前問善男子善女人善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心蒙佛輾轉開悟我等皆淨信無餘但前所問善男子善女人不過以凡心初發菩提之一念未敢希及證佛今既得我佛示以覺路聞之者莫不興感理修實證之心今善男子善女人發理修實證阿耨多羅三藐三菩提心復聞經義不可思議誠恐餘義不能悉達稍有餘疑自必動心舉念致與住心降心便不相應願佛於不可思議中曲垂方便而申釋之云何應住云何降伏其心佛告須菩提佛告須菩提曰善男子善女人發阿耨多羅三藐三菩提心者既發理修實證之阿耨多羅三藐三菩提心者當生如是心至此當生如如不動之是心心雖如如不動但佛法以度衆生而起大悲以大悲而生菩提心一切衆生與我一體我欲滅度亦欲令彼滅度我應滅度一切衆生我應滅度一切衆生乃同體慈悲之道也然修佛之因必須滅度一切衆生而如如之心乃真空無相之體不應住相生心也滅度一切衆生已滅度一切衆生已至於盡不能起能度之我相所度之衆生相而無有一衆生實滅度者則般若觀照常住不滅凡前所有一切妄心原非真性中所有如紅爐點雪消融殆盡無一衆生實滅度也何以故佛云此何以故也須菩提佛呼須菩提曰若菩薩有我相人相衆生相壽者相即非菩薩若學道之菩薩四相未除則菩提心無由而發何以言菩薩所以者何所以然者何須菩提佛呼須菩提曰實無有法以性本空寂渾然天成其發此心不過自修自悟實無有法發阿耨多羅三藐三菩提心者發此阿耨多羅三藐三菩提心者也須菩提佛呼須菩提曰汝已聞我説實無有法發心於意云何於汝之意云何如來於然燈佛所昔日我為菩薩時於然燈佛所有法得阿耨多羅三藐三菩提不有法可得無上正等正覺否不也須菩提弗也答之世尊啓咨世尊曰如我解佛所説義如我解佛所説無法發心之義因源既無有法可發果海自無有法可得佛於然燈佛所佛於本所處無有法乃自性自悟無有傳授祕法得阿耨多羅三藐三菩提得菩提之道也佛言如是如是佛以須菩提之言為當故稱如是如是須菩提佛呼須菩提曰如是如是之義實無有法如來得阿耨多羅三藐三菩提實無有法可得此菩提須菩提佛呼須菩提曰若有法若曰有法如來得阿耨多羅三藐三菩提者則能所未忘我法俱在心且難降何堪作佛然燈佛即不與我授記即不當與我止授一記汝於來世云我來世當得作佛方得作佛號釋迦牟尼號釋迦牟尼梵語釋迦云能仁即度脫一切也梵語牟尼云寂默即心體如如也牟尼為體即是如字能仁為用即是來字先言釋迦後言牟尼者攝用以歸體也如來者從體以起用也總是真性詳言之則為阿耨多羅三藐三菩提略言之則為如來又略言之則為佛諸法如義者蓋我真實之性本來自如其見之於諸法事亦自然而來為應迹去無留滯如如不動之義理即上無為法也以實無有法得阿耨多羅三藐三菩提蓋本原不從外得偏虗空世界而常自如所謂一法不立一塵不染也是故然燈佛與我授記然燈不過與我授記而已作是言何曾得法於他汝於來世當得作佛號釋迦牟尼皆是我如來本性也何以故有法得無上菩提則不與記無法得無上菩提乃與授記如來者蓋如來者即諸法如義即諸法如如不動之義也有法可得心有所動則不如如無法可得一念不生實合如如之義也乃與記不與記之所以也若有人言設若有人言如來得阿耨多羅三藐三菩提我得此菩提之法須菩提佛呼須菩提曰汝便向他説到實無有法不知我從實無有法上得之佛得阿耨多羅三藐三菩提然我得此法者實無有法上得之須菩提佛呼須菩提曰即人言如來所得阿耨多羅三藐三菩提於是中得菩提之果於是中無實無虗以無實故無妨如來説一切法以説有不有説空不空也以無虗故説有説空皆是佛法説有不有為妙有説空不空為真空是故如來説一切法皆是佛法皆是般若之佛法也須菩提佛呼須菩提曰所言一切法者然人心之大事未明須賴此法指示迷途除去四相即非一切法若真空既悟我自得之法亦非有方名佛法也是故名一切法佛所以隨説而又掃去者蓋謂不可泥於法耳須菩提佛呼須菩提曰譬如人身長大我設一譬喻如人之一身雖長且大果真為大須菩提言須菩提已證入深解不待譬喻之畢世尊即啓世尊曰如來説人身長大如來説人身長大者即為非大身心不菩提徒為妄形則非真實大身是名大身是虗名大身而已須菩提佛聞須菩提所答之言即呼須菩提曰汝謂取相不名大身離相是名大身菩薩亦如是菩薩亦如是不可取相應當如是離相若作是言若菩薩自言我當滅度無量衆生我當滅度一切衆生作言自負則心中實有我為能度相衆生為所度相我相人相皆不能無取相生心即不名菩薩何以故何以故即不名菩薩蓋菩薩應離一切相有相則有法無相則無法法由緣會而生其性本無有法無法則無我無我一切諸相皆空則妄心不降而自伏真如自住矣須菩提佛呼須菩提曰實無有法但真性中自有無上菩提之妙本無衆生可度又何有法可據名為菩薩此所以名為菩薩也是故佛説一切法是故佛説一切法者不過隨時順宜與人解粘法縛而已豈有能所心哉無我無人無衆生無壽者須菩提佛呼須菩提我謂度生應當離相而度法已得聞矣然不但有情之衆生應當離相而度即無情之佛土亦當離相而嚴若菩薩作是言若菩薩自説我當莊嚴佛土謂我能莊嚴佛之剎土亦是取相是不名菩薩是著於有相何以故所以者何如來説莊嚴佛土者我所説莊嚴佛土者非為粉飾外貌之具乃吾心佛土也佛土無相本來清淨云何可莊嚴哉即非莊嚴惟不住於相不莊之莊不嚴之嚴是名莊嚴是則所以名莊嚴也須菩提佛呼須菩提曰若菩薩通達無我法者若菩薩通達於一切有情無情皆無我法者則諸相無住一心清淨真如自住妄心自伏如來説名真是菩薩此如來言説而名稱之曰真實的菩薩也一體同觀分第十八二心一體五眼同觀故謂之一體同觀分須菩提佛呼須菩提曰我謂滅度衆生無滅度衆生相莊嚴佛土無莊嚴佛土相然燈佛授記釋迦無法可得相因果一切皆無有相如來成佛之時無有諸相成佛之後亦無有知見相但佛具五眼能照見一切衆生根器淺深緣因故設此五眼沙界二喻之問於意云何於汝之意云何如來有肉眼不如是世尊須菩提啓咨答曰如是世尊如來有肉眼觀見障內之色謂世界中一切凡有形相之色也須菩提佛又呼須菩提於意云何於汝之意云何如來有天眼不如是世尊須菩提啓咨答曰如是世尊如來有天眼天眼者能照見障內之色如日月星辰旋伏因緣也須菩提佛又呼須菩提於意云何於汝之意云何如來有慧眼不如是世尊須菩提啓咨答曰如是世尊如來有慧眼慧眼者能照見一切衆生慧性根器淺深也須菩提佛又呼須菩提於意云何於汝之意云何如來有法眼不如是世尊須菩提啓咨答曰如是世尊如來有法眼法眼者能照見虗空法相也須菩提佛呼須菩提曰於意云何於汝之意云何如來有佛眼不如是世尊須菩提啓咨答曰如是世尊如來有佛眼佛眼者智無不及照無不周實照見衆生妄念妄心時起時伏有恆河沙數之多世法上論指五眼為佛眼睛之眼以理論則心竅之眼也眼通於心大凡衆生皆具此五眼與佛無二因四相六塵遮蔽只有肉眼一件而已儒書云聖人之心有七竅即是五眼之謂也佛有五眼乃常性真心非過去未來現在之妄心也須菩提佛呼須菩提曰於意云何於汝之意云何如恆河中所有沙佛説是沙不如是世尊須菩提啓咨答曰如是世尊如來説是沙以喻衆生之妄心也須菩提佛又呼須菩提於意云何於汝之意云何如一恆河中如是沙等恆河者一粒沙為一恆河所有沙一沙為一恆河則恆河亦無數之多有如是沙等恆河舉此無窮之沙等恆河者謂一粒沙為一恆河廣設譬喻而言恆河也是諸恆河是諸沙數之多恆河所有沙數所有之沙數在佛所説法之世界處如是無量無數之沙佛世界佛世界者三千大千之內必有一佛設化謂之曰佛世界如是寧為多不果多否乎甚多須菩提言甚多世尊啓咨世尊而答佛告須菩提佛告須菩提曰不必遠論恆河沙界爾所爾者近也國土中乃爾之國土中所有衆生所有許多衆生各具一心若干若干者許多也種心實如恆河中若干無數沙之種種妄心如來悉知如來以清淨五眼皆盡見知之蓋一念不生神鬼莫測一念將萌神鬼共鑒所有衆生妄心如恆河沙數之多如來智無不照豈有不悉知者乎何以故其故維何如來説諸心如來所説一切諸心皆是衆生妄心皆為非心皆非性中常住真心識得妄心非心是名為心若去妄還真是名為心所以者何佛徵釋所以者何為非心是心須菩提佛呼須菩提曰若能覺悟本心掃除妄念過去心不可得思念前事者為過去心也過去心者滅無滯於物則過去即無過去心不可得也現在心不可得思念今事者為現在心不住何所專主於有現在心不可得也未來心不可得思念後事者未來心不將迎則念慮未至神鬼莫測未來心不可得也三心了不可得即見自性如來所謂見性明心立地成佛發進修實證之菩提心者可不知勉哉六祖曰前念後念及今念念念不被邪見染張無盡云一念不生全體現法界通化分第十九福德無故而得福性圓滿法界通入化境故謂法界通化分須菩提佛呼須菩提曰我謂過去現在未來三心皆不可得於意云何於汝之意云何若有人滿三千大千世界七寶若人有以滿三千大千布施之福俗眼為實佛眼為無以不可得之心為因以滿三千大千世界七寶為緣以用布施用為布施是人以是因緣是人以是之心不可得之因緣而行布施得福多不其福德果多否如是世尊須菩提深會其理啓咨答曰如是世尊此人以是因緣此人以是不可得之因緣而行布施則因如緣如得福甚多佛聞須菩提得福甚多之答欲發明福多之解須菩提佛呼須菩提曰若福德有實若以有得之心行施則福德在住相希生之實住相行施乃是妄心便不得福德性如來不説得福德多如來不印可説得福德多今以不可得之心行施則福德無住相希望之故無住之福無得之德則福性等於虗空無有邊際故如來印可汝説得福德多前以寶施身施不及持經之福德以福德無故今以福德有實如來不説得福德多以福德無故如來説得福德多如來説得福德多可見前此較量布施之福德不及持經之福德非不欲人布施惟欲人體般若無相之法以布施自得福德之多離色離相分第二十色相原妄離相明真故謂離色離相分須菩提佛呼須菩提曰爾莫錯認如來色身作如來真身看故因此疑而問於意云何於汝之意云何佛可以具足色身見不不也須菩提深悟佛意隨以弗也答之世尊啓咨世尊而答如來不應以具足色身見何以故何以見之如來説具足色身蓋如來説具足色身乃血肉之軀非法身則縱橫無礙自在自由念念無非般若即非具足色身是名具足色身豈八十種好所能囿耶色身中有妙色身存焉方名具足色身須菩提佛又呼須菩提曰汝既謂不應以具足色身見佛於意云何於汝之意云何如來可以具足諸相見不不也須菩提亦以弗也答之世尊啓咨世尊曰凡有實相即非清淨之體如來不應以具足諸相見何以故所以者何如來説諸相具足蓋如來説諸相具足亦由因深所感之故而現有之諸相非無故無為之真相即非具足是名諸相具足但舉三十二相好之果以勸衆生信是名諸相具足良由全法無為之本體先起應身相好之用乃相而無相見而無見無見而見者也非説所説分第二十一佛之説法隨感而應非預孰所説故謂非説所説分須菩提佛呼須菩提曰汝既解悟如來不應以具足色身諸相見自應以無相法身見也但恐有人謂現在説法者乃具足色相也致疑有所説則有相無相則何有説汝勿謂如來作是念爾切勿自謂我如來有心作此念頭我當有所説法莫作是念爾亦莫作是念謂如來有法可説何以故佛自徵何以故莫作有法可説之念隨自釋其義而言若人言如來有所説法設若有人言如來有所説法乃執法未空與佛説相違即為謗佛不能解我所説故不能解我所説相空法空之義須菩提佛又呼須菩提説法者乃證明無所説之旨我所説法者乃隨機施設無法可説若真性本來明寂無法可説是名説法但為衆生住真降妄而説是名説法也如如居士云終日喫飯不曾咬著一粒米終日著衣不曾挂著一莖絲所以我佛説法四十九年未嘗道一字爾時爾時者須菩提起問之時也慧命須菩提慧命者慧以德言命以壽言即長老之異名乃記者之稱須菩提之詞也須菩提自雖深悟其理但思佛不可色相見法不可聲音求二義俱深於未來世衆生善根淺薄恐難生信白佛言世尊是以啓咨世尊而問曰頗有衆生於未來世聞説是法謂未來世界有衆生聞説此般若經法生信心不能生敬信心否佛言須菩提佛呼須菩提曰汝勿謂五濁惡世之間俱是不信佛法之人蓋佛與衆生原非兩類同具此般若真心彼非衆生彼雖為衆生而真性內原有不可以衆生目者非不衆生彼雖非衆生而業緣現在固不可以衆生目之何以故佛告須菩提曰一切衆生皆有佛性自能聞法生信以悟真如是彼非衆生也執相生心迷蔽真性是不衆生也佛又自釋謂彼非衆生非不衆生者何以故須菩提佛呼須菩提而釋曰衆生衆生者以聞法不生信心故也衆生之性與佛同原無有差別如來説非衆生如來説非衆生因不信無相無住之法背真逐妄自喪性靈故非衆生中人也是名衆生為衆生者豈可自住衆生之相執迷而不悟哉是假名衆生耳無法可得分第二十二本自圓成豈從外得故謂無法可得分須菩提須菩提聞佛所説白佛言而白佛言世尊啓咨世尊曰佛得阿耨多羅三藐三菩提為無所得耶前聞我佛所説實無有法得阿耨多羅三藐三菩提今聞無法可説是名説法諸義此理智通妙有慧顯真空修證者當深信佛得阿耨多羅三藐三菩提佛言如是如是佛聞須菩提之所説重言如是如是以嘉其所説之是須菩提故呼須菩提申明其所問之義而答曰我於阿耨多羅三藐三菩提無上正等正覺之法不從外得乃吾之真性也乃至無有少法可得以真性之德寂神凝智泯不以色相取不以言説求不但無多法可得乃至無有少法可得也是名阿耨多羅三藐三菩提不過強名曰阿耨菩提而已蓋一念不生妄盡理融是名阿耨多羅三藐三菩提進發修證菩提者豈可為法所縛不悟妙性本空無有法相哉淨心行善分第二十三無四相以淨心修善法以行善故謂淨心行善分復次須菩提佛又再告須菩提曰我所説阿耨菩提之法乃吾本然之性是法平等蓋自性菩提是法在凡不減在聖不增而平等也無有高下是色身則有高下真性則無高下是名阿耨多羅三藐三菩提所以名為無上正等正覺也何以見之以無我無人無衆生無壽者以我真性原無有我人衆生壽者之妄若有此妄則嗜欲深天機必淺攻取纍湛一不全吾見塵旁種種異起何得為平等法哉法為平等方名無上菩提矣修一切善法佛又説當修此一切善法凡布施持戒忍辱精進禪定智慧皆是明心見性之善法依此法修則虗己明真崇德履道造至覺地矣即得阿耨多羅三藐三菩提即得此阿耨菩提也然又恐人泥於有法須菩提故呼須菩提曰所言善法者所言善法者乃接引衆生人道之門本來原無此善法不過假名以開悟人耳不住四相而修則修同無修如來説即非善法若執著善法便有人我等相矣是名善法是名善法也不住四相而修則修無所修如是之修修至阿耨多羅三藐三菩提之因乃名真修不住於法而得得無所得直得阿耨多羅三藐三菩提之果乃名真得是我所謂無有少法可得之義耳福智無比分第二十四布施為福持經為智以福較智福不及智故謂福智無比分須菩提佛呼須菩提曰我説無我人衆生壽者四相修一切善法即得阿耨多羅三藐三菩提良由離此四相以修善法則了脫貪嗔癡愛四惡業并六塵不能相染而六度亦無所住心念全忘意識盡泯湛然清淨之心真超入太虗境象得無上菩提我思無相修善之法所得真證無上菩提如是以清淨無為之道心超出三界永劫常存其福德寧有比倫乎若三千大千世界中所有諸須彌山王所有諸須彌山王上至忉利天下至崑崙際如是等七寶聚設將七寶聚如須彌山之高大有人持用布施其施可謂大以如是大施之因必得如是之果所得福德亦應大而不可窮極若人以此般若波羅蜜經若人以般若經乃至四句偈等并四句偈受持讀誦受持有得於心為他人説為他人演説有益於世於前福德比前七寶布施之福德百分不及一百分不及持經之一分百千萬億分即百千萬億分乃至算數譬喻所不能及皆不能及持經福德之一分人可以布施徒求於外而不求於心哉蓋以四句偈等受持讀誦為他人説自利利他直使人我同證無上菩提之大道至是如如不動之般若光無不遍化無不周乾坤不能覆載劫火不能毀壞體物不遺天人仰賴以視須彌山之高不啻大千世界一微塵其布施之福德有何可與持經者較量而比議哉化無所化分第二十五衆生本性皆善豈有所化故謂化無所化分須菩提佛呼須菩提曰我謂是法平等無有高下以無我人衆生壽者修一切善法即得阿耨多羅三藐三菩提蓋謂一切衆生各具真如之性平等而無聖無凡無有高下衆生與佛同源若悉能以無我人衆生壽者四相修一切善法則衆生即是如來何有衆生可度哉於意云何於汝之意云何汝等勿謂如來作是念凡汝學道諸人勿謂我如來實有此意我當度衆生必有化度衆生之心須菩提佛呼須菩提曰莫作是念汝等莫作此如來度衆生之念何以故何以故莫作是念蓋是法平等無有高下無高則無度衆生之如來無下則無所度之衆生實無有衆生如來度者縱有衆生執著四相迷性惑心如來不得已説法破執而覺迷則如來乃離相説法離相度生豈作是念見有衆生可度我謂能度乎度而非度亦實無有衆生如來度者若有衆生若有聞經悟道衆生自然化度我何度之有哉所謂平等真法界佛不度衆生也如來度者若説一切衆生必是如來化度如來即有我人衆生壽者如來即有能度之我相所度之人相可度之衆生相即有我已成佛永劫不壞之壽者相有此四相又何能得證如來抑安能得度衆生耶須菩提佛呼須菩提曰如來實無有我人衆生壽者四相以證如來如來説有我者不過尋常隨世流布之言口雖説我即非有我如心中即非有我而凡夫之人而執相迷心凡夫之人不明離相之意以為有我須菩提佛呼須菩提曰凡夫者性本平等與佛同源無有高下如來説即非凡夫因執著我人衆生壽者四相不修一切善法以致迷蔽真性是名凡夫是名凡夫也法身非相分第二十六無為法身離有為相故謂法身非相分須菩提佛呼須菩提曰我謂如來説有我者即非有我而凡夫之人以為有我無我者即為如來有我者即為凡夫無相之旨豈可不深明徹悟哉前汝已解三十二相不可以見即是如來雖不可以有相之應身見是如來於意云何於汝之意云何可以三十二相觀如來不果以三十二相觀如來否須菩提言須菩提意謂應身相好乃法身中流出有諸內者始形諸外若不圓滿性中法身安能有此三十二種相好如是如是故答言如是如是以三十二相觀如來欲觀如來不出此三十二相也佛言須菩提佛聞須菩提以相好觀驗如來之答知須菩提於無相之法尚有細惑未遺故舉近事以質使之不辨自明是以呼須菩提曰若以三十二相觀如來者設若如來可以三十二相見轉輪聖王轉輪聖王在天為四大天王糾察人間為聖為王亦懲勸人間善惡曾修三十二淨行故亦得三十二相好但不無生滅之心不能如佛之永脫輪轉不變不易無始無終而道化之常存不息即是如來如來道性常存無為自治豈轉輪聖王之所及乎須菩提已證無諍三昧第一阿羅漢道不能成佛者惟此毫釐之相未遺耳茲聞佛轉輪聖王之喻些須之相一掃全空須菩提白佛言世尊故即啓咨世尊曰如我解佛所説義如我解佛所説轉輪聖王之義不應以三十二相觀如來爾時世尊佛知須菩提至此已透徹無相真空之法但恐現在未來一切衆生隳於見聞不悟真性而説偈言彼時世尊而説偈曰偈者發言成句也若以色見我以音聲求我是人行邪道不能見如來蓋真性之如來視之不見聽之不聞何可以色見聲求若以色見聲求是人不了悟率性之謂道如舍正路而不由乃行邪道何能得見真性之如來佛以慈悲平等惟願衆生脫離苦趣故深戒以向外營求欲人汲汲乎反求諸己而已矣色者如莊嚴佛像之類見者親覩之也聲者如歌揚梵講之類求者索也我者佛自謂也邪道者因聲色乃是幻妄惟真性方為正覺也如來者真性法身佛也無斷無滅分第二十七法無斷滅故謂無斷無滅分須菩提佛呼須菩提曰汝既知不應以三十二相觀如來如來不可以色見聲求則無相之法已證深解斯時汝之心意一物無有一掃全空矣但此時又不可執著於無以墮於斷蓋執有執無皆非道中汝若作是念汝若作此念頭如來不以具足相故如來不用具足之相得阿耨多羅三藐三菩提得此無上菩提須菩提佛呼須菩提曰莫作是念汝切莫以此念而言如來不以具足相故如來原無聲色可求非三十二相不假清淨妙行圓滿功德得阿耨多羅三藐三菩提遽然得此菩提大道也須菩提佛呼須菩提曰汝若作是念我誡汝莫作是念者以汝為衆標榜後學龜鑑汝若執著不以具足相故得阿耨多羅三藐三菩提作如是之念發阿耨多羅三藐三菩提心者説諸法斷滅如我所謂實無有法發阿耨多羅三藐三菩提心者以諸法如義無實無虗非謂諸法斷滅也莫作是念汝若作此念言於一切法皆斷滅之大非矣何以故何以言之發阿耨多羅三藐三菩提心者發菩提心者必依般若之法以為修行之具若不用此法則心花何由而發於法不説斷滅相故於此不説斷滅相矣不受不貪分第二十八菩薩所作福德無自受之心無貪著之念故謂不受不貪分須菩提佛呼須菩提曰我謂如來説有我者即非有我不以三十二相觀如來莫作是念如來不以具相故得阿耨多羅三藐三菩提誠以非有我相則無我執一切諸法悉皆無我既無我相諸相皆空清淨之心湛若太虗故於三十二相不住於有具足相好不住於無有而不有無而不無隨順因緣毫無動念以成就空忍空寂之心實證無上無為之大道若菩薩以滿恆河沙等世界七寶若發無上菩提大心之菩薩不悟無我之法徒以恆河沙等世界七寶持用布施持用布施則有貪福之我相與大道至公無我之心便不相合又何能充塞天地化育群生哉若復有人知一切法無我若復有人深知一切萬法從我自心而生湛若太虗不住不著無有我心我者私己心也成者成就也得成於忍得成就此容忍功德此菩薩此等菩薩勝前菩薩勝前寶施之菩薩所得功德所得之功德何以故何以故也須菩提佛恐須菩提錯認世間福德故又呼而告之曰以諸菩薩以諸菩薩原無所得之心不受福德故不受福德故是以為勝也須菩提擬不受福德之迹疑果從因若固執不受則有必固我之相豈得為勝須菩提白佛言須菩提未解其義世尊啓咨世尊曰云何菩薩不受福德云何菩薩不受福德須菩提佛呼須菩提示以心法菩薩所作福德無自受之心一心惟知我欲滅度一切衆生但願衆生悉受福德滅度一切衆生已不計我為能度者亦不知實有衆生我度者不應貪著如此不應貪著之心而得實證菩提之果是故説不受福德所以説菩薩不受福德也威儀寂靜分第二十九去來坐臥四威儀來去如如為寂靜故謂威儀寂靜分須菩提佛呼須菩提曰我謂一切法無我得成于忍是離一切諸相以見自性之如來若有人言設若有人不悟此理言如來以莊嚴相好之身如來若來若去若坐若臥若來若去若坐若臥為利益一切衆生是人不解我所説義是人不解我所説一切法無我得成於忍之心也何以故何故不解我所説之意蓋人執著如來應身色相實有所來去也要知人之真性各自具足本來不生不滅道化常存若真知一切法無我得成于忍不為六塵所蔽不為法相所拘則如如不動之真性雖無相無為自能萬法含容光無不遍化無不周超出三界永劫常存矣如來者如來者即隨自性之所無所從來如而來無所從來亦無所去亦無所去也故名如來故名如來發阿耨多羅三藐三菩提心者當知一切法無我得成于忍之義離一切諸相以來真性清淨之如來則自然不執如來之來去坐臥而生心也長水法師云譬如水清月見非是月來水濁月隱亦非月去因水有清濁非月有升沉心淨見佛非是佛來心垢不見亦非佛去以人心有垢淨佛本無來去也一合理相分第三十一合真性是為性理之相故謂一合理相分須菩提佛呼須菩提曰我謂若有人言如來若來若去若坐若臥者是人執相生心不解我所説一切法無我之義也如此執著塵世之中一切妄境觸而動念者等於碎為微塵之多不可窮極若善男子善女人以三千大千世界碎為微塵碎分為微細塵埃於意云何於汝之意云何是微塵衆寧為多不以為多否須菩提言甚多須菩提深悟佛意言甚多世尊啓咨世尊而徵釋何以故何以故謂甚多蓋一切塵勞散於塵境觸境而動念者不可數計言甚多但微塵雖多乃虗妄之體不堅之質念動即生念寂即滅本非堅實而常有者若是微塵衆實有者此微塵衆俱是人心妄想安立若曰真個有此微塵衆多佛即不説是微塵衆佛則不説是微塵衆也所以者何妄塵皆是外來之物非吾性中之本有若能心鏡常明微塵雖多不為所觸安能蔽我靈府佛説微塵衆即非微塵衆此非微塵衆是名微塵衆若不能了悟真心惑於一切塵境是名微塵衆世界乃微塵積成既無微塵何有世界微塵世界皆是假立色相原不真實微塵在太虗之中遊氣飄揚任起滅世界在太虗之中明暗色空山河大地任聚散若真性般若窮劫不壞豈二者可比哉世尊須菩提悟入深解復啓咨世尊如來所説三千大千世界皆由妄塵積聚而成劫數盡時終有變壞此所以虗妄不實即非世界不過現在尚存是名世界是名世界也何以故須菩提又徵釋何以故謂之非世界蓋積塵成世界析界作微塵世界皆屬虗妄終有壞時本非實有不壞之質故釋云若世界實有者若以世界為實有者必是本來真性自無始以來常住不滅以此真實之性在於世界中打成一片有不滯於迹無不淪於虗即是一合相即是一而不可合之以為二合而不可折之以為離乃是一合相之真性如來説一合相然如來説一合相之真性等於無形可見無聲可聞如來於相離相説一合相不可執著實有即非一合相又不可執著為實無是名一合相乃強名一合相矣須菩提佛見須菩提之言已悟入深解故再呼而告曰一合相者乃真性虗靈之體無有形色聲音者惟當自省自悟有而不滯於迹無而不淪於虗真空不空妙不容言即是不可説即不可言説求者但凡夫之人但庸常之人不知遇相離相遇空離空之義貪著其事貪著塵境事相以微塵世界為實有以色身六根為真我不悟靈明之真性所以沉淪而無由解脫也知見不生分第三十一知見無見此即正見不生無生此即常生故謂知見不生分須菩提佛呼須菩提曰般若經中於我四句無相之偈反覆辨難輾轉較勝者蓋因四句之義信之淺者可以破執覺迷信解深者可以住真降妄窮造其極直使般若智慧圓滿乾坤超出三界不動跬步彈指已到波羅密之道岸矣我是以不避饒舌之嫌汲汲乎欲人信解但相由見生有相之見則為妄見無相之見始為真見至又不得不將四見相與辨明使發菩提心者得以信解去妄歸真而同證無上無為之大道此我之深意也佛恐人著於妄見不能見性故發此問若人言佛説我見人見衆生見壽者見若人言佛説我人等四見須菩提佛呼須菩提曰於意云何於汝之意云何是人解我所説義不是人解我所説真見妄見之義否不也須菩提以弗也答之世尊啓咨世尊曰是人不解如來所説義四見之義雖簡易理實精微執有執無皆非真見非覺悟之深者莫能窺其奧若是一切之人不解如來所説之義何以故須菩提又徵釋何以故是人不解如來所説義世尊啓咨世尊曰説我見人見衆生見壽者見蓋如來説我見人見衆生見壽者見見自性之無求無得湛然常住以清淨我見也見人之真性各自具足以清淨人見也見真性中本無煩惱可斷以清淨衆生見也見自性無變無異無生無滅以清淨壽者見也此四見乃佛所説見自性之真見也若衆生於是非愛取舍中處處著見逢色而受遇境則觸執一切色相皆有以墮常見此固不能信解四見之義也即深信而不能深解者聞佛所説無相之法遂執四相以無為而不能融通活潑致墮斷見猶如稿木死灰而無生發之機亦不能使般若之體圓通周遍是亦不能信解四見之義也即非我見人見衆生見壽者見執有執無皆是妄見即非我見人見衆生見壽者見之真見也是名我見人見衆者見壽者見惟不執於有不執於無有而非有無而非無不墮常見不墮斷見自得法性圓融湛然常淨是名我見人見衆生見壽者見也是我所説未能覺悟深解之是人不解如來所説義耳須菩提佛聞須菩提解説四見之義深悟透徹了達無餘實合佛意遂呼菩提曰發阿耨多羅三藐三菩提心者若能興起無上正等正覺之真心者於一切法應如是知應如是致不墮常墮斷之見如是見應如是起不墮常墮斷之見如是信解應如是發不墮常墮斷之信解不生法相不生知見信解之法相佛雖示以不生法相尚應解修證者難得不生法相須菩提又呼須菩提曰所言法相者如來心中無有法相之見隨係外應無實無虗如來説即非法相不過假此為人解粘釋縛使人得以生真降妄是名法相是假名為法相而已法相既非必無我人衆生壽者之見而菩提真心所當知見而信解者也發菩提心者曷審于此如是知如是見即無上菩提之真知真見也法者事也相者形迹也至生法相者于事之形迹如我人衆生壽者之見皆不萠于心也應化非真分第三十二夢幻泡影露電皆是應化無常之假質非真實常存之本體故謂應化非真分須菩提佛呼須菩提曰如汝所解云見真性中本無我人衆生壽者四相乃是清淨我人衆生壽者四相之真見我謂如汝所解之義應如是知見信解不生知見信解之法相則萬緣全空萬法歸宗而威儀寂靜知見不生性契無上菩提之道心無餘涅槃之實相使湛然清淨之心圓周三界歷劫常存無物不生生物不測若有人以滿無量阿僧祇世界七寶若有人以滿無量無央數之世界七寶無量阿祇世界者不止于恆沙也持用布施持用布施于人固為世間福矣若有善男子善女人發菩薩心者發菩提普濟之心者持於此經持于此經偈乃至四句偈等乃至見自性中無相四句偈等受持讀誦自見其性為人演説又演説于人推演講説教人亦得以明心見性其福勝彼此則出世間之福成己成物受福無窮寧不勝彼滿無量無央數世界七寶持用布施之福哉云何為人演説不取於相如如不動何以故佛又自徵曰我所謂不取于相如如不動者何以故蓋真性湛然常寂無相無為本自如如一切有為法一切賢聖莫不以無為法而實證菩提若世間一切有為法皆虗妄不實如夢幻泡影如妄夢之非真如幻術之假化如水泡之起滅如身影之恍惚如夢出無心幻成有意夢覺入幻幻結疑夢皆從顛倒起也如露亦如電如朝露之易晞如電光之易暗水漚為泡泡隨水消形照為影影從形滅皆虗為實也露以日晞電以霽散尤為倐忽起滅應作如是觀當作如是六者觀觀六者生滅無常虗妄不實則知一切有為之法皆有形有相妄偽而不真實也惟我如如不動之真性無形無相起萬劫而不朽不生不滅歷亘古而常存能于無相之偈受持讀誦為人演説者其福德寧可較量而思議哉此六字中凡人事之感應山河之安立天地之變化都已説盡此四句剗盡經旨正如來真切滅度之處觀無所具空觀假觀中觀之妙智也佛説是經已佛既反覆闡明般若之法説經已畢長老須菩提首焉起請之長老須菩提頓悟真空已聆心印其時同會聽法者及諸比丘有比丘而名僧焉比丘尼有比丘尼而名師姑焉優婆塞有居士而謂之優婆塞焉優婆夷有道姑而謂之優婆夷焉一切世間天人阿修羅一切天上人間及阿修羅等護法之神聞佛所説聞佛所説此經皆大歡喜各各見性不驚不怖不畏皆大歡喜幸正法之難遇悅今日之躬逢信受奉行莫不信受其言而領于心奉行其教而演于人雖歷億萬劫永證金剛不壞身佛恩之慈悲至矣觀是經者寧可不宣揚妙法以報佛恩乎川禪師頌曰飢得食渴得漿病得瘥熱得涼貧人遇寶嬰兒見娘飄舟到岸孤客還鄉旱逢甘澤國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量剎塵沙界諸群品盡入金剛大道場
