body:
  text: 金剛是金中之精堅者剛生金中百鍊不銷質極堅利不為物破而無物不破譬如般若能照破衆生貪嗔癡愛一切顛倒之見也般若者梵語華言智慧性體虗融照用自在故云般若梵語波羅蜜華言到彼岸欲到彼岸須憑般若此岸者衆生作孽受苦墮落沉淪之地彼岸者謂諸佛究竟到人欲盡淨光明正大之地經者徑也猶云路徑謂欲到彼岸必由此路徑也波羅蜜有六種一布施度慳貪二持戒度淫邪三忍辱度嗔怒四精進度懈退五禪定度散亂六智慧度愚癡各占六度之一惟一般若能生八萬四千智慧則六度兼該萬行俱備佛言梵語中國莫識其義宏始三年姚秦迎鳩摩羅什至長安待以國師之禮請什用中國語翻譯此經指示後學蓋人之真性本是虗靈不昧歷劫常存惜為萬欲昏蔽所以沉淪苦海受報無窮我佛慈悲特説此經猶乘筏度津以至彼岸也所謂金剛者蓋萬物不能逃乎五行而五行之中惟金最堅利長久木有時而朽水有時而涸火有時而熄土有時而崩以金試之於木則能成器用沉之於水則光湛常新投之於火則百鍊愈精埋之於土則永劫不壞其位在西北能摧折萬物人能用之於身可以斬一己之邪魔除萬里之妖孽儒有龍泉寶劍安定國道有青蛇寶劍斬絶情欲佛有金剛寶杵降伏魔王大易以乾為首元門以金丹為首此經以金剛為首得此般若者證西方無量壽果西方金方也金之為義大矣哉故以金剛為喻般若者智慧也人生日用間圖名貪利姦偽百出至死時心尚不足自以為乖巧伶俐不知溺於罪孽苦海真癡愚也必以智慧打破癡愚獨秉乾剛勇猛精進明了自性豈不到彼道岸與諸佛同清淨身如哉總之金剛喻也般若法也波羅蜜證果也此講章乃石公天基所注於金剛般若波之義所解甚明故存原講姚秦三藏法師鳩摩羅什奉詔譯姚秦譯經時也後秦姚氏建都長安為別秦符氏故稱姚秦鳩摩羅什譯經者之名也什父名鳩摩羅炎母名耆婆祖居印土家世相國其父以聰明見稱避位出家遊學龜茲龜茲王聞以女迫而妻之乃生什什處胎日母增慧辨如舍利弗處胎相似什生母即學佛修行得證初果自年七歲亦俱習佛乘從師受經日誦千偈九歲隨母到罽賓依名德法師槃頭達多習小乘經論十二歲其母携還至月氏北山有羅漢見而異之謂其母曰此子當善守之如過三十五歲不毀戒度人不減毱多若破戒者止可才明俊藝法師而已又到沙勒國見佛鉢隨頂戴之俄念鉢重即不能勝失聲下之母問其故即以唯心之義答之乃還龜茲名蓋諸國至於四明五圍諸論陰陽星算等術莫不窮微盡奧從從卑摩羅義學十誦律又從須利耶蘇摩咨稟大乘乃知從前學小乘之非如是專習大乘廣求要義有頃什母預知龜茲運衰辭往天竺進證三果臨行謂什曰方等深教當闡秦都但於自身乃有不利奈何什曰菩薩之行利物亡軀果其大化得行雖富爐鑊無恨乃留住龜茲止王新寺後又到罽賓為其師槃頭達多具説大乘妙義達多感悟反禮什為大乘師焉自是道播西乾聲流東震當此土前秦符堅建元九年異星現於西域分野太史奏曰當大德智人入輔中國堅曰臣聞龜茲有羅什襄陽有道安得非此二人耶於是先致道安後遣驍騎將軍呂光率兵七萬伐龜茲致什至西涼光聞符堅為姚萇所弒乃自據涼土即三河王位什亦留止萇即位亦聞師名屢請光不允萇卒子興立復請不允光卒子隆立姚興伐涼請什至長安待以國師之禮當宏始三年時也因見舊譯經論卒多不與梵本相應乃集沙門八百餘人所譯經論九十八部凡三百九十餘卷所譯此經名金剛般若波羅蜜什臨滅集衆謂曰自以暗昧謬充翻譯若所傳無謬當使焚身之後舌根不壞後果如之是知師舌興如來廣長舌相等無有異所以此經六譯而時所宗尚皆宗秦本今疏依之佛生於西土閻浮州當東土周昭王二十四年甲寅歲四月初八日從母摩耶氏右脅而入即從右脅而出涅槃於穆王五十二年壬申歲二月十五日越一千一十七年至後漢永平十年戊辰歲其教始行於中夏梵音佛華言覺也謂於一切有情中能覺悟也內覺無諸妄念外覺不染六塵又云教主也非相而相應身佛也相而非相報身佛也非相非非相法身佛也釋迦文佛談般若二十二年計六百餘卷金剛般若乃第五百七十七卷名曰斷疑品大部般若之總要故獨流通能令持誦者得堅固生智慧惟貴恆誦無間自然感應利益無窮也是經古今刻本最多每有錯訛雖經蓮池大師較正而諸本仍有傳誤茲刻考訂原文字字端的更於句下圈點分為三類佛所説者用此圈須菩提説者用此圈阿難結者用此點俾讀者一目了然經意不解自明矣嗣文佛七十一世孫法輪沙門行敏頂禮謹述余所著此經者因見各家經解甚多悉心細查未有傍注恐讀者不能悟悟者不能誦故詳明傍注使讀者一目了然可以隨時參悟知其義理修一切無相無為之法非教人徒然持誦遂得福德之勝內修之福田外修人所共見共聞謂之陽德內修人所不覩不聞謂之陰德有相有為自不及無相無為之福外修自不及內修之福陽德自不及陰德之大以見般若無相之法六度萬行皆當體此無相之法修是以輾轉教人受持讀誦為人解説使人知無相之法精為奧妙可以自修自悟明心見性耳蓋信受者要知三藏之大略先除六根六塵後除五蘊全空方能入無我人等四相無我人等四相則自然民脆物與為懷六根六塵污染不著則不見有辱之人受辱於我自然精進一乘永不退轉則四大非有五蘊全空心心相贖自然清淨則自性常空無有障礙一真顯露光無不遍照無不周佛説經成藏無非發明四句之義佛法包括無餘故無我人等四相之法不但為金剛一部之骨髓實為三藏全經之骨髓讀經者知此四句實為經之全體可謂真能契般若經者也奉佛者能遵此施行何患彼岸之不到哉是則余之願也夫是為序法會因由分第一如是我聞至敷座而坐乃序説法之時會衆之處故稱法會因由分如是我聞如是者此也我者即集經者自謂也阿難尊者曰如此之法乃我親聞之于佛也一時一時者謂説般若之時也佛佛者覺也自覺覺他覺行圓滿故名曰佛即釋迦牟尼佛也在在者所在之處舍衛國舍衛國者波斯匿王所居之國祇樹祇樹者匿王太子名祇陀園中樹乃祇陀所植故名祇樹給孤獨園給孤獨園者舍衛國有一長者王之宰臣本名須達拏常好施給孤獨因名之為給孤獨長者給孤獨長者在祇樹園建造精舍請佛説法故曰祇樹給孤獨與大比丘衆梵語比丘華言乞士謂上乞法於佛以明己之真性下乞食於人以為世人種福蓋佛將説真空無相妙理必得道之深者方能領悟豈小比丘所能與哉比丘者菩薩羅漢之類也千二百五十人俱千二百五十人俱此諸弟子凡佛説法之處常隨侍而同處也爾時爾時者彼時也世尊佛為三界之尊故稱世尊三界欲界色界無色界也食時食時當午前將欲食之時也著衣著衣著柔和忍辱之衣即僧伽之衣持鉢持鉢持四天王所獻之鉢入舍衛大城入舍衛大城園在舍衛國城外故曰入乞食於其城中乞食於其城中佛是金輪王太子誰無供養而自持鉢乞食欲教化衆生之捨離憍慢去此貪心並欲使後世比丘之不積聚財寶以煉種性正君子謀道不謀食也次第乞已次第乞已不越貧從富不捨賤從貴如來大悲平等無有選擇次第皆到而已還至本處還至本處謂乞畢而歸還祇樹園之處飯食訖飯食訖謂食飯已完收衣鉢洗足已收衣鉢洗足已謂收起袈裟鉢盂洗足以淨身業將入禪處於是收拾其衣鉢使心無係纍也洗其足以潔其身也敷座而坐然後敷座而坐敷乃排列也謂排列序次之座而坐此我佛之去來動靜任運合道歷歷我所親見而畢記者法會之因由如是而起矣善現起請分第二善現出座問佛故稱善現起請分時時者謂佛自入城還園敷座而坐時也長老長老者德長老之謂衆弟子之中惟德尊而言之須菩提須菩提梵語也華言解空一名善現謂能解悟空理善揚發現也在大衆中在大衆中者在千二百五十人衆也即從座起善現即從自己座位起身整頓威儀出座起立也偏袒右肩偏袒其右肩者以示不敢倍乎其師東土以謝過請罪故肉袒西土以興敬禮儀故偏袒右膝著地右膝著地者以示不敢左乎其道般若經云右是正道左是邪道必以右膝著地偏袒亦以右肩者用正去邪之意也以見身業虔誠合掌合掌者心合於道道合於心以示其歸依也恭敬恭敬者以示其嚴肅心恭意敬以見意業虔誠而白佛言內外虔誠方啓白佛白者啓也言者發語讚歎也希有世尊希有者少也猶言少有我世尊也如來如來者佛之總稱如而不生來而不滅即或真性之體用單修智慧曰菩單修福業曰薩雙修曰菩薩諸菩薩只會下學道之人如者以真性之光明照無量世界而無所蔽慧通無量劫事而無所礙能變現一切衆生而無所不可是誠能自如者也其謂之來者以真性能隨所如而來現故謂如來善護念諸菩薩善現謂如來入城還園去來如如不動密示住心標榜後進正是護持注念在會諸菩薩與以智慧力上求佛果使之信受也善付囑諸菩薩又以食訖晏坐一念不生密示降心模範新意正是付囑在會諸菩薩與以教化力下度衆生使之奉行也菩者覺也薩者有情一千二百五十人皆善惡俱遣之大比邱於一切有情中皆能覺悟也但恐未來衆生不得親覩我佛儀容無有標榜世尊故啓咨世尊而問曰善男子善女人謂世間或有善淑男子並女人學道之初發阿耨多羅三藐三菩提心先發此無上菩提之佛心阿無耨多羅上也三正也藐等也三正也菩提覺也梵語阿耨多羅三藐三菩提華言無上正等正覺也以真性湛如無有更上之者故云無上然上自諸佛下至蠢動此性正相平等故云正等其圓明普照無偏無虧故云正覺得住此性者智無不遍用無不周不言自治無為自化善現良以善男女初發是心輕若鴻毛不能同佛隨緣安住云何應住當如何常住而使之不退轉云何降伏其心當如何降伏而使之不惑亂我真心也應者當也云何者如何也住者止也降伏者制禦之謂也佛言善哉善哉佛因聞善現之所問甚善實足以繼往聖之心傳開後學之法故重言善哉以讚美之須菩提佛呼須菩提曰如汝所説如來善護念諸菩薩善付囑諸菩薩如汝所説如來善護念付囑二句原是善發我未發之言汝今諦聽佛深契善現所問善發我未發之言如此我若不説則為失人故云汝當詳審諦聽當為汝説當為汝説此住心降心之道善男子善女人善男下謂人之一心朋從往來攻取日衆最難發此菩提覺心發阿耨多羅三藐三菩提心若善男子並女人既發此無上菩提之真心則滿腔中純是天理真如本性自然顯露自然常住不滅應如是住如是降伏其心應當如是常住不滅則五蘊自然皆空如是一切妄心不待驅除而自降伏矣所謂道心為主人心退聽也譬如日光一照黑暗盡明唯然善現聞佛所説篤信於心隨應之以唯旋思而復應之以然者惟恐初發心之善男女乃現在未來衆生不能了達一貫之理必得我如來條分縷晰以開道世尊是以啓咨世尊而曰願樂欲聞我等弟子願樂欲聞我佛之分別解説得以垂經顯法使現在未來衆生遵循於不朽耳大乘正宗分第三是經為大乘者説非教小乘者住大乘惟降伏其心不能降伏者以有我人等四相也四相既離妄心自伏真如自住非正宗而何是以謂大乘正宗分佛告須菩提佛告須菩提諸菩薩摩訶薩佛告須菩提諸菩薩摩訶薩皆大悟菩薩也我謂善男子並女人發阿耨多羅三藐三菩提心應如是降伏其心應如是住如是降伏其心若果能應如是所發之心常存不昧則一真顯露無妄可降如是降伏其心矣其所以不能常住此所發之菩提本心者因妄心迷蔽真心至是必須先降伏妄心使人欲淨盡而天理流行也汝皆欲上求證佛下度衆生者也自度度生應如是降伏其心矣所有一切衆生之類所有一切衆生雖無數無窮總不外乎四生八變之十二類故種種一切衆生妄心極難降伏何以見之若卵生卵為想生或有心易輕舉飛揚遠適謂之卵生若胎生胎因情有心常流轉習氣深重謂之胎生若濕生濕以合感心隨邪見沉淪不省謂之濕生若化生化以離應此四生也心見景趣遷變起幻謂之化生若有色執相修因頓起邪思名為有色若無色內守頑空不修福慧名為無色情想合離更相變易有色情而合無色情而離依胎而變若有想滯諸聞見係念染著名為有想若無想靜沉死水猶如木石名為無想有想想而合無想想而離依卵而變若非有想起生滅見落兩頭機名非有想非無想非無想然此九種衆生心皆非菩提真心一或有之死即隨類受生墮於胎卵濕化之物虗空等神天魔等鬼所以輪回六道難入涅槃者也非有色情離而合非無色情合而離依濕而變非有想想離而合非無想想合而離依化而變故有十二類衆生我皆令入無餘涅槃我者佛自謂也皆者盡也令者使也入者行至於內也無餘者無有餘剩也梵語涅槃此云謂無餘涅大涅槃也滅消滅也度化度也佛之意蓋説如前所謂一切衆生妄心皆不是我菩提覺心我皆令此受學諸菩薩將此妄心入於清淨無為之鄉消融其渣穢度脫其染者如紅爐點雪必使人欲清淨纖毫不留造於元默之境所謂心外無餘道道外無餘樂也人有虗靈之性包括天地謂之真空又名法身亘古亘今所不能滅即大禹見黃龍負舟自言生寄也死歸也四大色身原是假合空無毀壞之理愚人不能明心見性所以死歸陰趣隨業受生遷轉不已聖人明覺了然如虗空杲日當天普照或出應時則為報身化身隨緣或不住世則棄四大如棄敝屣永證清淨法身寂然常樂是其來也從體起用無所從來其去也攝用歸體亦無所去豈非涅槃常住不滅哉世人不知誤以為死非也楞伽經云涅槃乃清淨不死不生之地一切修行者之所依歸而滅度之而滅度之滅者化也度者度生也滅化以度其生使各遂其生也如是滅度佛説如是以前所言滅度之道使般若智慧打破種種邪見煩惱無量無數故此無限量無計數如是滅度天上地下人間四生七趣十二類之無量無數無邊衆生無邊際一切衆生之心行無為自然之化實無衆生實無有滅度衆生之相得滅度者以衆生為我得而滅度者今已滅度無餘者豈我真能使之令入涅槃而滅度之哉蓋以凡夫原有此無上菩提之心只為迷而不悟今心地一旦豁然開朗頓見本性空寂是乃自性自度本來無此衆生妄心曷得而滅度之何以故夫無有衆生得滅度者何以故也佛自徵何以故謂實無衆生得滅度者蓋真性即是道真性虗靈至公無我本無我人衆生壽者四相方是無上正覺之道心若有我人等衆生壽者即是衆生無此四相即是菩薩須菩提佛呼須菩提曰若菩薩若諸菩薩摩訶薩皆修無上菩提之因已證菩薩之果或若有此四相則前一切衆生妄心安能滅度以至涅槃哉決非菩薩地位中人矣有我相若計我為能度則有我相也人相若計他為我度則有人相也衆生相若計滅度無量無數無邊衆生則有衆生相壽者相若更計滅度衆生經萬劫而不息歷亘古以如茲則有壽者相有此四相則自心不能降伏與衆生無異即非菩薩且我人衆生壽者四相即是貪嗔癡愛四惡業貪則惟思我富我貴逞己之長炫己之能爭名奪利只為我身之計是我相也嗔則嫉人之有妬人之能攻人之短吝人之來訐人之私皆人相也癡則五蘊計其和合六塵汩沒靈源是衆生相也愛則執法修因希冀飛升或燒丹煉藥期求增算或舍義而貪生或臨難而苟免是壽者相也有此四相則貪嗔癡愛之心纏綿固結五蘊六塵之勞擾粘染如此妄心之執迷則與道相違而沉淪無窮盡也若離此四相則一念不生全體發現妄心自伏真如自住天地合德日月合明四時序而生生不息之機與道合真也況佛説大乘無上菩提之法總不外乎六度波羅蜜一布施二持戒三忍辱四精進五禪定六智慧若無此四相則六度兼該無我人等四相則自然民胞物與為懷即是布施波羅蜜無我人四相則六根自無而六塵污染不著即是持戒波羅蜜無我人四相則不見有辱我之人受辱於我即是忍辱波羅蜜無我人四相自能精進一乘永不退轉即是精進波羅蜜無我人四相則四大非有五蘊全空心心相續湛然清淨即是禪定波羅蜜無我人四相則自性常空無有障礙一真顯露光無不遍照無不周即是智慧波羅蜜佛説經成藏無非發明此四句之義佛説也括無餘故無我人等四相之法不但為金剛一部之骨髓讀經者如此四句為金剛之全體可謂真能契般若經者也學佛者能遵此四句十一字而修行之則無上菩提之真心何患彼岸之不到哉妙行無住分第四菩薩妙行法應無住故謂妙行無住分復次須菩提復次者連前起後之詞也佛呼須菩提曰我謂應如是降伏其心之法滅度無量無數無邊衆生實無衆生得滅度者以住我人衆生壽者四相我故説若菩薩有我人等四相即非菩薩菩薩於法蓋菩薩於六度萬行之法以布施為先應無所住應當無所住行於布施行於布施也若四相既無所住則六根自無所住也六根既無彼六塵者又安住何所所謂不住色布施所謂不住於眼即不住色布施矣不住聲香味觸法布施不住於耳鼻舌身意即不住聲香味觸法布施矣須菩提佛是以呼須菩提曰菩薩應如是布施汝等菩薩應如是布施不住於相也我謂菩薩應如是布施於自心衆生捨其所貪歸於空寂不於六根六塵上有所係纍拘執但自性虗空妙圓明淨隨感而應不住於相不住於相何也何以故佛自徵何以故若菩薩不住相布施則六根清淨五蘊全空以湛然明寂之心行普度衆生之法圓滿無上菩提之道則盡皆善福其福德不可思量其福德量等虗空豈人之心思可得而測度忖量哉非享福報之謂也須菩提復又呼須菩提曰我謂不住相布施之福德不可思量於意云何於汝之意云何東方虗空可思量不譬如東方虗空可思量否不也須菩提答云以大莫大於虗空非人之所能測度故以弗也世尊啓咨世尊而答佛思不住相布施之福德猶不止一方虗空之可較量須菩提佛又呼須菩提曰南西北方四維上下虗空可思量不不也須菩提意以一方之虗空尚不可思量而十方之虗空更不可測度而思量矣故亦以弗也世尊啓咨世尊而答須菩提佛聞須菩提兩次弗也答之知須菩提已深悟十方虗空之不可思量是以呼須菩提而告曰菩薩無住相布施福德亦復如是不可思量四方四維上下虗空之不可思量也須菩提佛呼須菩提汝要知無住相布施之福德等於十方虗空之大不可思量汝等菩薩之學道者不必他有所求菩薩但應如所教住但應如我所教不住相之法以無住而住之理便就此上應用之間湛若十方空無所住而住可也如理實見分第五破執相虗妄習情始悟真如之理實見真性如來故謂如理實見分須菩提佛呼須菩提曰我謂菩薩應不住相布施應如我所教無住相而住於意云何於汝之意云何可以身相見如來不可以色身之相好見即是如來之法身否不也須菩提了達此理即以弗也世尊啓咨世尊而答不可以身相得見如來何以故須菩提又自解曰何故不可以身相見之如來所説身相蓋如來所説身相不過形體之末非真空無相之道豈可指而謂之真如來哉即非身相即非身相也佛告須菩提佛聞須菩提所答已悟身相之不可住故又呼須菩提進一層以告曰汝既知現具身相乃屬形體之化質凡所有相世間凡有形相可見可聞可嗅可食可觸可法乃天地人物山川草木昆蟲一切有形有色諸相皆是虗妄皆有生有滅乃是虗妄而非真實堅牢之本體若見諸相非相若見一切諸相能體全空之非相必無執相迷真之失自能回光返照即見如來即見自性中有平等法身之如來隨處顯現不致住相布施得無住之法矣刊定記云執相迷真對面千里虗心體物天地一家正信希有分第六正信謂一念不偏希有謂實為難得分須菩提須菩提得聞佛説無住布施無相見佛之法白佛言世尊乃白佛言啓咨世尊曰我佛説無住布施若見諸相非相即見如來之義我已得生實信矣但此理奧妙深微後之學佛者恐不能悟此精蘊以致難生實信且衆生布施大半為求福之因希得富貴利達之果不思成佛聞無住之因見佛之果不獨以為渺茫難及抑且所樂不從以致不生實信頗有衆生不知頗有衆生得聞如是言説章句得聞如是無住無相之言説章句生實信不果能生實信否佛告須菩提莫作是説佛告須菩提曰汝莫作生實信否之説然此無相真空妙理必有大根基之善人方能任其道如來滅後設或佛滅後後五百歲到五百歲之時乃濁劫惡世之中不信佛法之時有持戒修福者有持戒而諸惡莫作修福而衆善奉行因持戒修福之力悟無住無相之理於此章句能生信心又能於經中之一章一句以此為實然生信固以持戒修福助成而能持戒修福又因宿善所發當知是人不於一佛二佛三四五佛而種善根豈於一佛二佛三四五佛種此善根哉已於無量千萬佛所種諸善根歷佛既多則聞法已多修行亦久自能了悟無住無相之理實修而實證汝何可以學佛者不能悟此精蘊而有難生實信之疑乎且無住無相之法我不徒為善根深者而説使之實修而實證也善根淺者自必經年受持纍月讀誦修菩提之因證菩提之果不待言矣即有善根之淺者惟知希福但六祖曰信般若波羅蜜能除一切煩惱信般若波羅蜜能成就一切出世功德信般若波羅蜜能出生一切諸佛聞是章句乃至一念生淨信者佛又告須菩提若有此善根之人聞得此經之章句乃至頃刻頓空四相淨焉而心不亂信焉而心不疑布施而三輪體空利濟而無分人我一念之中能生淨信須菩提佛呼須菩提曰如來悉知悉見如來色相雖滅法性常存周遍虗空無微不照如來悉知悉見不肯沮其一念淨信之心必使遂其所求之願是諸衆生得如是無量福德我能盡知盡見此人雖名衆生而持戒修福之德善根受用不盡其福德豈有限量哉世間所享者名福報信此經者名福德何以故佛言是諸衆生何故得如此之福德是諸衆生蓋一念之能生淨信是諸衆生已深契無住無相之理頓悟大道至公無我之心無復我相人相衆生相壽者相無法相四相既無諸相自然不有不執著於心外之法而生妄見無法相矣亦無非法相所行布施方便持戒忍辱亦無非行善去惡之法相矣何以故佛又轉徵無我人等相無法相無非法相者何以故耶是諸衆生蓋是諸衆生若心取相若心取相則有我之見必私己利己而無濟人利物之心即為著我人衆生壽者若取法相汝若取法相則必心外求法而不悟本心即著我人衆生壽者何以故佛轉徵何以故若取非法相若取非法相則必毀佛謗法而不修明心見性之善因即著我人衆生壽者是故不應取法是故不應取法而生執不應取非法不應取非法而生疑以是義故以是無住無相之法修佛者得大乘智慧希福者得無量福德之義故如來常説如來常説各經中言之詳矣汝等比邱知我説法當知我與汝等説此法者因汝諸人有此四相不能了悟真空起於彼岸我不過假此法門度脫生死苦海既見自性證涅槃樂則我之當棄之無所用矣如筏喻者如渡河之筏喻者渡衆生一切災厄流離之患難普濟以慈航豈以一味教人證佛之法哉善根深者實信實修法尚應捨何況非法功圓果滿自登覺岸而證菩提即善根淺者能一念淨信即一念善緣自獲福報且無住無相之法原教人明心見性遷善改過寧捨法而悟性不可執法以迷心如來教人修真悟性之法尚不可執著而寧捨何況執我之法為精微奧妙學佛者之難生實信是取法也疑佛法不能希求世福而求福者之不生實信是又取非法也取法取非法皆非我之法也汝安得以無人實信而生頗有之疑乎傅大士曰譬如過河須用筏到岸不須船無得無説分第七體空無得言寂無説是以謂無得無説分須菩提佛恐須菩提尚未透徹故云設此問呼須菩提曰我謂不應取法似無法可得無法可説又謂不應取非法又覺似有法可得有法可説也蓋我之所説者真空不空之法耳於意云何於汝之意云何如來得阿耨多羅三藐三菩提耶以我如來無上菩提之法果有所求而得之於己耶如來有所説法耶抑以此法諄諄然有所説而教於人耶須菩提言須菩提了悟佛意乘機而答曰如我解佛所説義解者曉也定者泥於一處而不通也如我心中解悟佛所説之義理不應取法不應取非法之義無上菩提之實性人人具足或由布施持戒而成或因忍辱精進而證或修禪定智慧而悟六度萬行皆可默契無有定法則知無上正等正之法此吾本來真空人人所具足者也名阿耨多羅三藐三菩提如來説法原為聞衆生之迷悟但衆生之根器有利鈍學性有淺深隨機設教對病用藥亦無有定法如來可説如來不盡之法只定無法可名如來不盡法言只無定法可説永曰佛説一切法為除一切心我無一切心何用一切法何以故須菩提自徵釋何以故無有定法可得無有定法可説如來所説法蓋如來所説者無上菩提之法皆不可取不可説非法非非法所以者何可以性修而不可以色相取徒取則何以深造於性理之妙故云不可取也可以心傳而不可以口舌説徒説則何以超出於意言之表故云不可説須菩提所以辨論兩者皆不可也但可取可説固不可取不可説亦不可若執著可取可説是必住於取住於説反成邪見且是法為開悟衆生而設非有真實之法故云非法若謂不可取不可説是住於無可取無可説即成斷滅然又須假此以開悟衆生如離筏渡河則有沈溺之害又不可同謂之非法故云非是非法也非法非非法即是如來所説不應取法不應取非法也所以者何是須菩提釋非法釋非非法之義一切賢聖皆以無為法而有差音雌別蓋謂法本不無莫作有見法本不有莫作無見作有則執法作無則執空不執法執空則了悟我法雙空即曰無為無為者自然覺性無假人為以者用也一切賢聖皆用此無為之法然法本無為悟有淺深悟得淺者則為賢人悟得深者則為聖人是無為之法則一因有淺深為賢為聖而差別之不一也佛説不應取法不應取非法須菩提總結出一無為之法真了悟透徹佛所説之義也此無為者即是無上菩提即是涅槃即是如來即是無相即是無住即是這金剛般若波羅蜜也有為法世間法也無為法出世間法也後學者要知無為實無不為可以超三界證菩提可以得無量無邊福德其功之大效捷誠莫可思量也若執著無為拘泥空寂勉強造作則無為而實有為反成稿木死灰而無用矣惟順我至中至正之真性於日用倫常之間率性而行各盡其道不偏不倚不即不離得自然而然之妙道斯為深悟無為之旨深契金剛般若之法依法出生分第八三世諸佛皆依此法出生功德是以謂依法出生分須菩提佛呼須菩提曰我説離相降心離相布施離相即見如來離相之一念淨信即得無量福德汝總結一無為之法誠能了達無相之旨發明我未發之言也我試以有為之法而較無為之法於意云何於汝之意云何若人滿三千大千世界七寶三千大千世界者言形容其多也世間之方位界限也三千大千統言一大世界也此日月所照為小世界其中有須彌山日月繞山運行故南為閻浮提東為弗婆提西為瞿耶尼北為單越是名四天下日月運行乃在須彌山之腰故此山之高半出日月之上山上分四所每方分八所中間有一所三十三所謂之三十三天梵語謂之忉利天是其中間有一所也日月運行如此四天下謂之小世界如此一千小世界謂之小千如此一千小千世界謂之中千如此一千中千世界謂之大千以三次言千字故云三千其實則一大千耳如此謂之一大世界七寶者金銀琉璃珊瑚瑪瑙赤珍珠玻璃七須也三千大千世界七寶極言七寶無數之多也以用布施以用布施以此無數之七寶布施於人布施定有福德況以七寶滿大千世界之多這個布施作捨施看與前篇無相布施不同是人所得福德寧為多不此人所獲福德汝以為多乎不多寧字作是字看須菩提言甚多須菩提會佛之意答云甚多世尊啓咨世尊而答何以故又自徵解何以故言福德之甚多蓋藉物而修僅得身外名祿之福德而於明心見性了無所得是福德即非福德性蓋是福德乃有相之施於我性中真空無相妙法全不相關必竟非福德性所得名祿福德終有盡期可以計其世代之遠近可以教其閥閲之多少非若內修福修無盡無窮不可數計是故如來説福德多故如來所言福德者乃人天小果之因以名祿之福德有數可計其多也佛聞須菩提答畢而汝云有為福德非福德性所得雖多終有盡期若復有人於此經中復者再也佛言如再有人於此金剛般若經中也受持受持者受謂領受於心持謂持守不失也信力曰受受之不忘於心也念力曰持持之不厭其久也乃至四句偈等四句偈等指無我人衆生壽者四相也等者凡有四句等處為他人説更為他人解説其義如一燈傳百千萬燈則是自度度他也其福勝彼所獲之福勝彼之七寶施者多矣住相布施縱得名祿之福福盡墮落此因經悟性性見心明福等大虗歷劫不壞故云其福勝彼何以故佛言人能受持講説是經其福勝彼者此何以故也六祖曰以財布施得身外之福受持經典得性內之福身外之福即衣食性內之福即智慧今生豐衣足食而愚鈍者即是前生布施而不持經典之人今生聰明貧窮無衣少食者即是前生持經而不行布施之人外修福德即衣食內修福德即智慧錢財現世之寶般若在心之珍內外雙修方為全福若要現在子孫及來世生身富貴智慧兼全者須是準修此是論歎持經功德恐人不知經典之利益故以勝布施之功德而較量然佛法六度亦以布施為先務人不可執此而捨彼也金剛經為大藏之骨髓耳須菩提佛呼須菩提曰一切佛法蓋真空無相之理乃諸佛之本性一切三世諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出皆從此經中所説四句無相之法悟出真性如來凡求阿耨多羅三藐三菩提者舍此更無他法矣須菩提佛又恐人執著於法復呼須菩提告曰所謂佛法者又曰所謂佛法者本來無有不過假此以開悟衆生使之言下見性乃虗名為佛法也真性中本來空寂無有相之法固不可執相生心又不可執法成病本性真實法非真實即非佛法故曰即非佛法汝當不即不離以求見性明心可耳一相無相分第九一真如相原無有相是謂一相無相分須菩提佛呼須菩提曰我謂一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經四句無相之法悟出真性如來不但諸佛如是即四果羅漢莫不由無相之法而證也蓋佛與羅漢雖有高下而真性菩薩無有增減不稍差別不過於無相之法悟有淺深證分高下佛是以將己得證四果羅漢為問以見凡四果得道者必從無相而得著不得絲毫之相於意云何於汝之意云何須陀洹已得初果之須陀洹能作是念我得須陀洹果不自謂我得此果否須菩提言不也須菩提知其不然乃曰世尊啓咨世尊而答何以故我何故謂弗也須陀洹蓋須陀洹初入無相之門名為入流得與聖人之流而無所入而無所入之念不入色聲香味觸法但不能頓悟真空而已不入色聲香味觸法亦無有不入之相是名須陀洹是故名為初果也須菩提佛又呼須菩提曰於意云何於汝之意云何斯陀含已得三果之斯陀含能作是念我得斯陀含果不自謂我必得此果否須菩提言不也須菩提即不然云世尊啓咨世尊而答何以故我何以故謂弗也斯陀含蓋斯陀含已深悟無相之理尚有一生一滅之心名一往來而實無往來是名斯陀含名一往來而實無往來之相是故名為斯陀含須菩提佛又呼須菩提曰於意云何於汝之意云何阿那含已得三果之阿那含能作是念我得阿那含果不自謂我有得果之心否須菩提言不也須菩提即不然云世尊啓咨世尊而答何以故我何以故謂弗也阿那含蓋阿那含內無欲心外無欲境欲淨而無私意之往來名為不來而實無不來是故名阿那含名為不來實無不來之相是故名為阿那含須菩提佛又呼須菩提曰於意云何於汝之意云何阿羅漢已得四果之阿羅漢能作是念我得阿羅漢道不自謂我得這箇道否須菩提言不也須菩提知其不然而即否世尊啓咨世尊而答何以故我何以故謂弗也實無有法性本自空實無有法可得也名阿羅漢蓋阿羅漢已造到情無順逆境智俱亡無有所得之念無有得道之相實無有法名阿羅漢世尊啓咨世尊而反徵之曰若阿羅漢作是念設若阿羅漢作得道之念我得阿羅漢道有我得阿羅漢之相即為著我人衆生壽者即為著我人衆生壽者四相矣是興凡夫無異安得謂之阿羅漢哉世尊須菩提又將平日所得佛説啓咨世尊而印證之曰佛説我得無諍三昧佛當日曾説我須菩提一念不生諸法無諍心無生滅正定空寂得無諍三昧人中最為第一得此之正見於諸弟子中是第一離欲阿羅漢許我為第一必定是我脫盡人欲斷絶此念方是許我為離欲阿羅漢也世尊啓咨世尊曰我不作是念因我不作得離欲阿羅漢之念我是離欲阿羅漢世尊復啓咨世尊又反徵之曰我若作是念我若是作此思念我得阿羅漢道我若作我得離欲阿羅漢之念則四相不空生滅猶在我即不是無諍三昧人中第一離欲阿羅漢也世尊則不説佛即不於諸大弟子中説須菩提是樂阿蘭那行者是好樂寂靜之人有是無諍之行也以須菩提何以見之以我須菩提不著修無諍三昧之行實無所行實無此樂阿蘭之行而名須菩提方才名我須菩提是樂阿蘭那行是樂阿蘭那行即是無諍三昧以無諍三昧方受解空善現須菩提之名樂者好也行者功也樂阿蘭行者謂好無諍三昧之行也萌諸心曰念見諸修曰行必有是得有是行而心無是行之念有所得而心無所得之相宜乎佛以樂阿蘭那行名之也莊嚴淨土分第十非外面修飾之莊嚴乃心地清淨之莊嚴故謂莊嚴淨土分佛告須菩提佛恐諸菩薩所得心未除執著住於有法不生清淨心故設是問呼須菩提曰於意云何於汝之意云何如來昔在然燈佛所我當初於然燈佛處得成無上菩提之道於法有所得不果然得本師之法否不也須菩提即解其意曰弗也世尊啓咨世尊而答如來在然燈佛所如來雖在本師處聽法不過因師開導實乃自悟自修於法實無所得於心外之法實無所得也須菩提佛又呼須菩提曰世間所謂莊嚴者造寺作塔行種種善事是有相莊嚴也佛恐人認做這樣莊嚴故呼須菩提而謂之曰於意云何於汝之意云何菩薩莊嚴佛土不菩薩於佛土中果作善緣福業莊嚴否不也須菩提隨答以弗也世尊啓咨世尊而徵釋何以故何故也莊嚴佛土者不莊而莊不嚴而嚴即非莊嚴即非外貌有相有為之莊嚴是名莊嚴乃是心地光明萬行具足之莊嚴是故名莊嚴也是故須菩提佛聞須菩提之所答實可啓當時之妙悟發後世之心傳是故呼須菩提曰諸菩薩摩訶薩諸菩薩指大修行人而言也菩薩莊嚴既不在于外飾則當反而求之於心使大字之中湛然常虗無一毫染濁靈台之內寂然常定無一絲擾亂法本心悟非由外得土因心定不在外莊應如是生清淨心當如是生清淨心不應住色生心不應住有相之形色生心也不應住聲香味觸法生心應無所住應於一切有相有為之煩惱塵勞無所住而生其心而生無相無為清淨真性之本心如此得以智慧圓明光無不照化無不周宇宙不能包藏天地不能覆載法身超出三界圓滿十虗矣須菩提佛呼須菩提曰我説無所住而生其心則真如發現如日月之照臨光無不遍如四時之運行化無不周譬如有人身如須彌山王於意云何於汝之意云何是身為大不可以言大否須菩提言甚大須菩提深悟佛意乃以甚大答之世尊啓咨世尊曰何以故又自徵釋何以故謂之甚大佛説非身是名大身蓋佛所説之身乃無相無為之非身故言甚大也若以有相之色身而喻則須彌山高廣三百三十六萬里為衆山之王色身何能敵其大惟無相之非身是我清淨之心乃真性之道體此心包括宇宙圓滿大靈無相無為萬法皆從此出則須彌山之身在真性道化之中又不啻一微塵矣是故佛説非身是名大身耳無為福勝分第十一無相四句乃無為之法受持四句之福勝恆河沙數七寶布施故謂無為福勝分須菩提佛呼須菩提曰汝今既明四果以無相而證釋迦之法以無相而得佛土之莊嚴以無相而嚴佛身之大以無相而大若能受持無相之法者其功果之福德豈可以多寡度量而思議哉試以恆河沙喻如恆河中所有沙數我今以衆人之所易見者先反詰之恆河之沙固多如是沙等恆河設或不只一恆河數其如沙之多恆河於意云何於汝之意云何是諸恆河沙寧為多不是諸恆河多乎不多西土有河名曰恆河從阿耨池東流出周回四十里沙細如麵佛多在此處説法故取為喻西土只有一箇恆河焉有許多恆河亦是假設之言須菩提言甚多須菩提答言甚多世尊啓咨世尊而曰但諸恆河但河中而有沙者一沙即為一恆河是諸恆河中各有其沙尚多無數且多無數何況其沙何況河中之沙乎言多而又多也佛設此喻以為較量福德多寡之張本須菩提佛聞須菩提以河沙無數之多而答故呼須菩提曰我今實言告汝我今以朴實言語告汝若有善男子善女人以七寶以七寶等物滿爾所恆河沙數滿爾所恆河沙數三千大千世界盡三千大千世界以用布施以用布施與人得福多不所得之福多乎不多須菩提言甚多須菩提即以甚多答之世尊啓咨世尊而答佛告須菩提佛告須菩提曰汝謂無數七寶布施得福甚多此乃有相之福德雖多而終有窮盡若善男子善女人於此經中於此般若經中乃至受持四句偈等信而受之於心會其妙義而毫無所疑堅而持之於心存其精蘊而毫無所失必見自己真如菩提之智朗然偹矣為他人説不能以此真空妙義為人解説使人聽聞之下心地開通明了自性可以脫離輪回永超生死則是人己兼成自他俱利得以漸悟真性明德新民而此福德此福即無為福也無有盡期勝前福德實勝前恆河沙數七寶布施之福德也所獲利益之多豈恆河布施者可同日語哉華嚴經云譬如暗中寶無燈不可見此喻菩提妙道非佛法不至尊重正教分第十二受持此經天人尊重故謂尊重正教分復次須菩提如來已較量持説雙行者而此福德勝前寶施之福德復次者連前啓後之詞也呼須菩提曰我謂於此經中乃至四句偈等為他人説而此福德勝前恆河沙數七寶布施之福德汝已聞知矣猶不持説雙行者有此勝福即專為他人説者亦不必于經中通前徹後全為人説但能於是經中或至無相降心或至不住相布施或至無相即見如來或至一念能生淨信者無有四相或至得阿羅漢道者不著四相也隨説是經若或有人隨其所在便能演説此經乃至四句偈等乃至四句偈等之妙令諸聽者除迷妄心當知此處當知此説經之處一切世間天人阿修羅自然感得一切天道人道阿修羅道皆應供養皆執幢幡寶蓋侍立左右供養恭敬如佛塔廟如佛之真身舍利寶塔如佛之法體神儀廟堂在此處何況有人何況有人盡能於一經全文盡能受持讀誦盡能于一經全文受持而體念于心讀誦而研窮其義則此無住無相之理乃阿耨多羅三藐三菩提之法真最上而無以加也第一而無可比也又絶無而僅有也須菩提佛呼須菩提曰當知是人當知是人盡能受持讀誦成就最上第一希有之法自然成就最上之清淨法身第一之圓滿報身希有之千百億化身也若是經典所在之處若是供養經典所在之處者即為有佛即自心是佛不從外得經在則佛在也若尊重弟子若供養經典之人為尊重佛法之弟子也經在法寶在也有佛佛寶在也為尊重佛法之弟子是僧寶亦在也三寶共處寧有不消災而致福耶若是者此經其可不説其可不讀其可不有乎六祖曰摩訶般若波羅密最尊最上第一如法受持分第十三當如金剛般若之法奉受持守故謂如法受持分爾時須菩提爾時彼時也須菩提聞前所説成就最上之法深有歆慕但未知受持之道何如白佛言世尊故啓咨世尊曰我佛謂盡能受持讀誦成就最上第一希有之法是此經功德誠莫可度量我等心切受持當何名此經請問此經當何以義命名我等云何奉持我等當何以道奉持佛告須菩提現在問答解説者無非發菩提真性之體用既有體用豈無名字是經名為金剛般若波羅蜜乃無上菩提妙心無相無住直至諸佛彼岸為最上希有之法以是名字汝當奉持汝當奉受而持守也然以無上菩提真性之體用而名字曰金剛般若波羅蜜所以者何其故維何須菩提佛呼須菩提曰佛説般若波羅蜜蓋以金剛之堅利能斷碎一切諸有相之物譬如般若智慧之精明能照破一切有相之煩惱得以度脫迷津而登波羅蜜覺岸是故佛説般若波羅蜜也即非般若波羅蜜但真性本來空寂無諸罣礙亦無有此岸彼岸之別人能守其真性不為諸境所染不須奉持此經即非般若波羅蜜也是名般若波羅蜜無如凡夫執著我人衆生壽者等相妄見妄念迷性感心又不得不假此破執而覺迷是名般若波羅蜜也但我所説般若波羅蜜原欲人了達般若性空之法豈可執泥言説其實真性即是菩提無妄可破無岸可登無法可説三昧經曰心無心相不取虗空不依佛地不住智慧是般若波羅蜜真妙理也大士曰恐人生斷見權且立虗名須菩提佛呼須菩提曰於意云何於汝之意云何如來有所説法不般若之法心法也如人飲水冷暖自知阿所形其擬議若有所説即謗佛也故佛問有所説法否須菩提須菩提了達性空法空之義白佛言世尊啓咨世尊答曰世尊與諸佛及一切衆生本性中同具有金剛般若波羅蜜如來無所説自性自悟直下何容開口處所以無得無説矣須菩提佛又呼須菩提曰汝謂真性本來堅利空寂無法可説但真性雖堅利空寂而塵世之色相可擾無奈衆生遇境則觸遇塵則染世界微塵細勞皆能迷蔽真性於意云何於汝之意云何三千大千世界所有微塵所有微細塵埃是為多不果為多否須菩提言甚多須菩提意謂大千世界中一切有色有相有音有聲之可喜可怒可哀可樂可愛可欲莫非微塵故言甚多世尊啓咨世尊而答須菩提佛聞須菩提甚多之答乃呼須菩提曰世界中一切色相音聲之微塵雖多皆非真實終有壞期若以般若智慧之力照破凡所有相皆是虗妄不為一塵所染彼微塵雖多何能擾我虗靈不昧之府諸微塵如來説非微塵原是幻妄之物雖有色聲香味觸法之多紛紛亂起而虗靈之府澄徹太空豈有纖毫塵垢而點污耶故言不是微塵是名微塵乃假名微塵也如來説世界非世界是名世界如來所説世界者蓋山河大地明暗色空原不是我心中本有的只因妄想安立故也人於世界中識得不是世界則心地廓然淨無瑕穢便是出世間法非世界之所能囿是名為世界也不過種種色相之微塵和合一世界劫數盡時終有壞時是亦虗妄即非真實之世界但是假名為世界也若以般若之功深圓明本來之覺性超出世界之表則不為世界所囿亦不是有世界文殊曰在世離世在塵離塵是為究竟法正此意也須菩提佛又呼須菩提曰如來説世界是名世界佛相亦世界中之一色身於意云何於汝之意云何可以三十二相見如來不可以三十二相見如來否不也須菩提深會佛意以弗也世尊啓咨世尊而答不可以三十二相得見如來如來之相雖勝妙殊絶不宜以形色求之何以故又自徵何以故不可以三十二相得見如來復自釋曰如來説三十二相乃色虗妄之化質即是非相蓋如來所説相者非真相也妙體如如湛然常寂乃諸佛本心者也是名三十二相是名三十二相三十二相如眼耳鼻舌等類此乃色身佛也凡所有相皆是虗妄者也須菩提佛聞須菩提於般若性空之法解悟透徹復呼須菩提曰世間所重者莫過於身命示以誦經功德而曰我所謂金剛般若波羅蜜者般若智慧光明寂然歷劫不寐實如金剛之堅利能照破一切諸相諸法如微塵之小世界之大佛身之大佛身三十二相之妙以般若力燎然知其虗妄而非真若能奉受持守實能覺妄明真以至真無妄之心無往而非善即無往而非福所得一切福德無有窮盡不但以七寶布施福德之福不可比較若有善男子善女人以恆河沙等身命布施比此身命布施如摩頂放踵利天下為之其所獲之福視寶施之福尤有加焉但不如本性頑福耳若復有人於此經中乃至受持四句偈等受持而講説之為他人説自利利他其福甚多其獲福無量較彼捨身者不甚多乎此金剛般若波羅蜜法汝當受持可也離相寂滅分第十四離諸形相自然寂滅分爾時須菩提爾時者彼時也須菩提聞佛言聞説是經聞説金剛般若波蜜經也深解義趣深解者心中大悟也義趣者義理旨趣也慧眼者聖人之心有七竅一聞千悟此智慧眼也深解佛説用自性真空之般若如金剛之堅利能斷除一切諸相之煩惱以見性空般若實相之義趣喜極生悲自傷聞經之晚又恐現在未來者不能信解受持致辜負我佛心傳之妙法涕淚悲泣遂不覺涕淚悲泣鼻出曰涕目出曰淚大痛曰悲微痛曰泣謂始而涕淚繼而大痛後而微痛微痛者收痛將陳也須菩提聞金剛般若之法得深解義趣徹底通明喜極生悲不覺涕淚悲泣一傷自己聞法之晚一傷現在未來之人恐不能信解受持也而白佛言啓白佛而言也希有世尊讚歎之詞也希者少也世間少有我世尊也佛説如是甚深經典佛説以本來真空無相之般若而入真空實相之般若如是甚妙深奧經典我從昔來我從昔修悟以來性知持守六根以致不入六塵境界漸次悟無相之理漸次脫離欲界漸次境智俱亡由今思昔以來持戒修行不知費許多苦修苦行始得第一離欲阿羅漢道所得慧眼有此慧眼善能聆悟未曾得聞如是之經未曾得聞即用自性真空無相之般若照破諸相之虗妄即得見自性真空般若之實相遂到諸佛波羅蜜覺岸如是之經也我今幸入法會已聞是經深解之義世尊啓咨世尊曰若復有人若再有人得聞是經得聞般若波羅蜜經也信心清淨信自心般若之清淨不住一切諸相即生實相即生真空無相般若之實相也當知是人成就第一希有功德成就無上菩提之道心為第一少有功德也六祖曰皆從清淨體中流出般若波羅蜜多世尊啓咨世尊曰是實相者是般若實相即是非相空若太靈無有形迹當體全空之非相是故如來説名實相若實有相即屬可壞是不堅之法也因無相而相亘古常存萬劫不壞是故如來説名實相也世尊啓咨世尊曰我今得聞如是經典我今親承教諭心聆神會信解受持能感發信解受持之心不足為難故不足為難也若當來世後五百歲年久之時其有衆生得聞是經不過於文字輾轉誦讀信解受持信心者即難解悟者尤難又何能聆受於心持守不失若非多種善根之人必不能也是人即為第一希有所以是人非一世二世之善根必屢世種諸善根方能如是即為第一希有之人不易得也何以故何以故此人不多有也此人無我相無人相無衆生相無壽者相此人於濁劫之世獨能信解受持無我人等四相所以者何又轉徵所以然者何我相因此人了悟我相即是非相本非真實堅牢之體即是非相人相衆生相壽者相了悟人相衆生相壽者相皆是虗妄終壞之質即是非相即非四相也何以故又徵釋何以故即為第一希有蓋此人已無四相之執既無四相則不見有因之可修有果之可得離一切諸相是離一切諸相我法皆空心常湛寂即是般若真空之真相即到波羅蜜之覺岸與諸佛齊驅並駕耳即名諸佛即名諸佛矣佛告須菩提佛聞須菩提所解般若之法離一切諸相即名諸佛深契般若之理故呼須菩提曰如是如是如是者所言當乎此理也若復有人佛説若果有人者無論現在未來之人得聞是經得聞般若妙法不驚不驚異而無疑心驚者駭其言之過也不怖不疑怖而無懼心怖者恐其道之高也不畏不畏避而無退心畏者怯其行之難也當知是人甚為希有當知是人甚為希有者離一切諸相甚為希有也何以故我何以故謂此人甚為希有也蓋此人善根種深已默契般若無相之法無時而行般若無時而非般若六度萬行無非般若故得聞是經自能信解受持了無可驚可怖可畏是人甚為希有也須菩提佛呼須菩提曰汝須知般若無相之法總攝佛法六度萬行一切諸佛阿耨多羅菩提皆不離夫般若無相之法而證也如來説第一波羅蜜蓋我所説第一波羅蜜乃與空無相自性自悟即如如來説第一波羅蜜乃由布施而到諸佛之彼岸也佛説三輪體空內不見布施之我相外不見受施之人相中不見所施之物相并不見第一波羅蜜之法相即非第一波羅蜜施無所施岸無所到即非第一波羅蜜是名第一波羅蜜不過假此開悟群迷而已因無相布施得登彼岸是名第一波羅蜜須菩提忍辱波羅蜜亦復如是無相之忍辱也忍辱波羅蜜由忍辱不生嗔心以真性而到諸佛之彼岸也如來説非忍辱波羅蜜但真空本來無相如來內不見忍辱之我相外不見我辱之人相中不見我心中能忍之相亦不見有忍辱波羅蜜之法相忍無所忍辱無所辱岸無所到如來説即非忍辱波羅蜜是名忍辱波羅蜜因無相之忍辱得到彼岸是名忍辱波羅蜜亦即是般若無相之法也何以故何以故如來説即非忍辱波羅蜜是名忍辱波羅蜜須菩提佛呼須菩提曰如我昔為歌利王割截身體我被割截身體時可鑒我於爾時無我相我於爾時心乃虗空不起四相所以無受割之我相無人相無割我之人相無衆生相無畏割之衆生相無壽者相無護命之壽者相何以故何以故也我於往昔割截手足耳鼻節節支解時當初節節支解散時可謂辱之極矣若有我相人相衆生相壽者相若有四相應生瞋恨應生嗔恨之心而豈尚願先度割截我之歌利王耶我不但近世之念賢劫中能無此四相須菩提佛又呼須菩提又念過去於五百世再又思念曾於過去五百世在莊嚴劫中作忍辱仙人作忍辱仙人時於爾所世曾修忍辱之行於往世亦無四相之界無我相無人相無衆生相無壽者相亦能無我人等四相我於近世念賢劫中及追憶五百世前之莊嚴劫中我皆無此四相故今得證佛果是故須菩提菩薩應離一切相欲成佛道菩薩者當空其心發阿耨多羅三藐三菩提心離去一切形迹方可發此無上菩提道心即能安住矣不應住色生心不應住著於色相而萌可好之心不應住聲香味觸法生心不當住著於聲香味觸法而起可欲之念應生無所住心當於無所住者而生其心則此心圓通無礙真純無欲非一切相之所繫縛應生無所住六塵等相之心方得此心人欲淨盡圓通無礙若心有住若心於六塵上有一住著便落他窠臼不能脫灑即為非住則所住不是菩薩住處佛因以心有所住即為非住是故佛説菩薩心佛自謂我説菩薩心者本虗而明若住色而為運用此心不為覺矣是故佛一向説菩薩心不應住色布施所以不住色布施也須菩提佛呼須菩提菩薩為利益一切衆生故菩薩因衆生而起大悲因於大悲而生菩薩心因菩薩心而成佛果菩薩所以必欲利益一切衆生故應如是布施應如是不住相布施也如來説一切諸相如來説離相布施何有諸相即是非相故非相也又説一切衆生又説一切衆生者以心有四相名為衆生即非衆生若能約己回光妄心自離即無衆生可得故非衆生也須菩提佛恐人聞此經之言便生驚怖畏懼不能成就乃開導之故呼須菩提曰佛説無相無住之法如來是真語者我如來所説般若波羅蜜法皆無上菩提了悟本性如來是真而不妄之語實語者實而不虗之語如語者默契真常之理如如不變之語不誑語者所言者至誠非欺誑之語不異語者所論者至正非異常之論不過欲人自性自悟之語須菩提佛呼須菩提曰如來所得法如來所得證如來之法欲言其實則無形可見無相可得欲言其虗則智無不遍用無不周無相而相無得而得實而不實虗而不虗此法無實無虗欲言其實則無形可見無相可得欲言其虗則智無不遍用無不周無相而相無得而得實而不實虗而不虗中庸曰君子之道費而隱正此謂也須菩提佛呼須菩提曰凡修行菩薩者當悟真空不宜有所住著以為運用也若菩薩心住於法若菩薩心中明知法不應住至行施時力不自由依然住於法而行布施而行布施則無明障礙如人入暗如人入暗室之中即無所見昏焉而一無所見則妄心何由而降覺心安得而住若菩薩心若菩薩心中既知法不應住不住法而行布施即不住法而行布施於外此則金剛眼然般若燈圓悟如來洞達無礙乃無上真性自見也如人有目如人本有眼目日光明照又得日光明照見種種色見種種色了知一切妄境而不為所縛則妄心自伏而覺心自住矣佛深見般若無相之法實足以感發人之善心懲戒人之惡意須菩提故呼須菩提曰當來之世當如來滅後五百歲之世若有善男子善女人能於此經受持讀誦設若有善男子善女人能奉受而持守於心讀誦而玩味其義不為諸境所觸自能去惡而為善離相以布施離相而忍辱如來色相雖已涅槃而如來法性常存不昧洞鑒無遺即為如來以佛智慧即到菩提覺位為自性如來佛以智慧清淨之目悉知是人去惡而為善悉見是人不住相以布施不住相而忍辱如來本大悲救度衆生之心惟善人更加護佑自陰庇默相使是人滿其所願皆得成就無量無邊功德此人皆得成就無量無邊見性之功德周法界而無方歷萬劫而常在豈有限量邊哉持經功德分第十五受持是經功德無量故謂持經功德分須菩提佛呼須菩提曰我謂昔為歌利王割截身骵時不過引往昔所歷之境以證明無我人衆生壽者四相始能忍辱無嗔而得自性之清淨非教人捨身以求佛也且佛於屢劫皆無此四相方能造入割無所割截無所截雖身被節節支解以無嗔念其身仍還復如故非已到佛之境界誰能若此佛恐人聞此割截身骵之説反起疑惑難信之心致住畏怖退悔之念又恐執迷之人執著捨身之説徒以身命布施而於自己心性與他人心性毫無利益故呼須菩提我試將以身布施者而較則可知矣若有善男子善女人初日分設有善男子善女人於一日之中自旦至辰時為初日分以恆河沙等身布施中日分自辰至未時為中日分復以恆河沙等身布施後日分自未至戌時為後日分亦以恆河沙等身布施莫謂一人止一身安得有恆河沙等之身於一日三時布施設即有無數之身每日三時布施如是無量百千萬億劫以身布施至於無量數劫則無量福報曷可勝言然止能受世間頑福耳若復有人聞此經典若有人聞此般若無相之經典信心不逆其福勝彼信自心本來清淨而不著四相以背逆於初心其福勝彼以身布施者多而且久也蓋以身布施者雖多而且久乃希求成佛住相布施也設若經典無相之法信心清淨不著四相以背逆於心則心見性明萬事同歸豈不勝彼恆河沙等身布施者執相迷心之福哉聞信不逆尚勝彼恆河沙等身布施之福何況書寫何況自書寫其章句而尋譯其言受持讀誦受持讀誦而解悟其理讀者一身之中手眼心意皆具般若為人解説又以是經與人解説其義則不徒自明己性且教人各各見性善根純熟利益無窮其福又烏有限量哉須菩提佛呼須菩提曰若能明此法門即見性成佛以要言之我只得以要言而説其義是經有不可思議則此般若真經有不可以凡心測度亦不可以淺言擬議不可稱量不可稱讚而度量無邊功德則此功德之無邊際雖讚歎所不及矣如來為發大乘者説如來為啓發大乘者説欲以載度一切衆生也為發最上乘者説為啓發最上乘者説欲以兼載度諸菩薩也如此之法惟大乘之根器方能持誦若有人能受持讀誦若有人能奉受持守於心讀誦研窮其義廣為人説如來悉知是人具大乘之智慧悉見是人具大乘上乘之根器皆得成就不可量不可稱無有邊不可思議功德此人既成就功德是莫大之功德如是人等受持讀誦以明心廣為人説以利衆以先覺覺後覺即為荷擔如來即能以身挺然任此大道背負為荷肩挑為擔言無上菩提至重之任阿耨多羅三藐三菩提將如來阿耨菩提之法荷擔無遺則自覺覺他覺行圓滿功德寧有涯哉何以故我何以故謂此人荷擔無上菩提之任須菩提佛呼須菩提曰蓋是人如非大乘上乘根器若樂小法者或樂小乘法者局於見聞之小樂者喜好也小法者鈍根之人志意不劣著我見人見衆生見壽者見不免有人等見之私則於此經即於般若無相之經必不相合既與道違而不相合不能聽受讀誦則自己不能聽受讀誦為人解説又何為人解説須菩提在在處處佛呼須菩提此經功德能持讀誦廣為人説者其功之大其德之多固不待言即無論城邑市廛山陬僻壤廳堂內室樓閣亭院舟車旅邸在在處處若有此經若有此持經之人則功德素著如摩尼寶瑞一切世間天人阿修羅一切世間天道人道阿修羅道所應供養皆應供養當知此處當知經在之處即為是塔即為如來真身舍利寶塔皆應恭敬誰肯生一慢心而不恭敬作禮圍繞必作禮而玉骵投地圍繞而大衆之歸依以諸華香以諸寶華妙香如華嚴經所謂闍提華香茉利華香青蓮白蓮赤蓮華香等類而散其處而布散於經在之處夫佛經在處即感動天人阿修羅如是之恭敬供養又何況受持廣為人説者寧有不得無量無邊之功德乎能淨業障分第十六金剛般若經能除三世罪業如云假饒造罪過山嶽只須妙法兩三行故謂能淨業障分復次須菩提如來於復次呼須菩提曰我謂此經功德不惟受持讀誦者所得福德無量無邊即在在處處若有此經者一切天人皆應恭敬供養如是之勝若善男子善女人設若有善男子善女人受持讀誦此經既能受持讀誦此經真可敬重也若為人輕賤真可尊貴而反為人輕賤其何故哉是人先世罪業蓋此人必是從前未曾得聞此經之時著於四相住於六塵故有罪過業緣應墮惡道當墮於惡境下流之地今世雷誅法誅鬼誅等惡道緣因受持讀誦此經得以輕報而償重罪以今世人輕賤故所以輕賤不恭敬供養故也先世罪業今既持經而真性圓明是本來無一物何處有塵埃已前之罪業即為消滅即消滅矣當得阿耨多羅三藐三菩提若能精進不已不惟先世罪業悉皆消滅當得無上正等菩提之果此經功德滅罪消愆迎祥迪吉之福莫可比議而較勝者也世者三十年為一世也惡道猶惡境也小而憂辱大而死亡皆是也六祖曰約理而言先世即前念妄心今世即是後念覺心以後念覺心輕賤前念妄心妄不能住故云先世罪業即為消滅妄念既滅罪業不成即得菩提又曰以先世今世作前念後念真確論也不可把先世後世認作前生後生須菩提佛呼須菩提曰我云寶施身施皆不能較勝於受持聞信此經之功德我念過去我今憶念於我往昔未發菩提心時已發菩提心時無量阿僧祇劫梵語阿僧祇此云無央數梵語那由他此云一萬萬劫者世也於然燈佛前及至於然燈佛前受記之時得值八百四千萬億約計得值八百四千萬億那由他諸佛即無量阿僧祇劫中所遇之諸佛也今以八百四千萬億而計那他者極言所遇之佛多也悉皆供養承事我悉皆如意奉贍以供養順命侍使以承事所遇一一諸佛我皆一一供養事無空過者無有空過一處而不供承者若復有人於後末世值人心險薄世道澆漓之時彼獨超群拔類能受持讀誦此經謂法久弊生波塵熾盛人根淺薄之世況無相無為之經佛悟違世之道率多憎嫉誰能信順今日能受能持能讀能誦其猶火裡蓮花故不可等間論也所得功德以是功德於我所供養諸佛功德較量我供佛之功德百分不及一百分不及受持讀誦此經功德之一分千萬億分即以我所供佛千萬億分之功德乃至算數譬喻所不能及乃至算數之多譬喻之廣皆不及持經功德之一分也須菩提佛呼須菩提曰若善男子善女人於後末世於後末法之時有受持讀誦此經有能受持其理讀誦其言所得功德所得無量功德必無疑矣我若具説者我若再盡言其詳或有人聞或有鈍根之人聞之起驚怖畏懼之心心即狂亂狂焉而無定持亂焉而無定見狐疑不信展轉如狐之疑惑不信受蓋不知此經之妙故也具者盡也狐是獸名野犴其性多疑果者功有所成報者理有所驗非今生後世果報之説須菩提佛呼須菩提曰當知是經義當知此經之義理乃真空無相最上一乘不可以心思言議探其底蘊也至於究竟一受持讀誦之間先世之罪業消滅無量之功德難及此果實報驗者不可思議果報亦不可思議又豈可以思議之哉真極盛而無以加也
